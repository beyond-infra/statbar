name: sync-tap

on:
  push:
    tags: ['v*']

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute sha256
        id: sha
        run: |
          SHA=$(curl -sL "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/archive/refs/tags/${{ github.ref_name }}.tar.gz" | sha256sum | awk '{print $1}')
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Update homebrew tap
        run: |
          git clone https://x-access-token:${{ secrets.TAP_GITHUB_TOKEN }}@github.com/beyond-infra/homebrew-tap.git /tmp/tap
          cd /tmp/tap
          sed -i "s|url \".*\"|url \"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/archive/refs/tags/${{ github.ref_name }}.tar.gz\"|" Formula/statbar.rb
          sed -i "s/sha256 \".*\"/sha256 \"${{ steps.sha.outputs.sha256 }}\"/" Formula/statbar.rb
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Formula/statbar.rb
          git diff --staged --quiet || git commit -m "bump to ${{ github.ref_name }}"
          git push
